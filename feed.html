<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Hincha - El Agite</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <header>
        <h1>El Agite</h1>
        <button id="burger" class="menu-btn">
            ☰
        </button>
        <nav id="nav-menu" class="nav-links"> 
            <a href="feed.html" class="active">El Agite</a>        
            <a href="profile.html">Mi perfil</a>
            <a href="followed.html">Seguidores</a>
            <a href="#" id="logout" class="logout-link">Cerrar sesión</a>
        </nav>
    </header>   

    <main class="feed-main container">
        <section class="post-create">
            <div class="user-post">
                <div class="avatar">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="#555">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <input type="text" placeholder="¿Qué estás pensando?">
            </div>
        </section>

        <section class="feed">
            <article class="post-feed">
                <div class="user-feed">
                    <div class="avatar">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="#555">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="user-meta">
                        <h2>Martín Córdoba <span class="username">@martinT</span> <span class="team-badge">Talleres</span> <span class="time">hace 2h</span></h2>
                    </div>
                </div>

                <p class="post-text">
                    ¡La T no se mancha! Tremendo triunfo en el Kempes.
                    Esta hinchada es la más fiel de Argentina.
                    ¡Dale Talleres carajo!
                </p>

                <img src="pasion-albiazul.png" alt="Imágen del la cancha durante el partido" class="img-post">

                <div class="reactions">
                    <button class="reaction-btn"><i class="fas fa-thumbs-up"></i></button>
                    <button class="reaction-btn"><i class="fas fa-thumbs-down"></i></button>
                    <button class="reaction-btn"><i class="fas fa-comment"></i></button>
                </div>
                <div class="comment-box">
                    <div class="avatar">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="#555">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <input type="text" placeholder="Escribe un comentario...">
                    <button class="send-btn">Enviar</button>
                </div>
            </article>
        </section>

        <section class="comments">
            <article class="comment">
            </article>
        </section>

    </main>
    <div class="agite-btn">   
    </div>
</body>
</html>
