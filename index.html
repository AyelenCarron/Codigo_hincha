<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código Hincha - Ingresar a la cancha</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Playwrite+AR+Guides&display=swap" rel="stylesheet">
</head>
<body>
  <div class="phone-wrapper">
    <div class="screen">
      
      <header>
        <h1>Ingresar a la cancha</h1>
      </header>

      <main>
        <div class="login">
          <img src="logo-codigoh.png" alt="Copa sostenida por dos manos" class="login-logo">
          <h2>Bienvenido/a</h2>
          <form action="/login" method="post">
            <div class="form-group">
              <label for="correo">Correo electrónico</label>
              <input type="email" id="correo" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit"class="btn-primary">Iniciar sesión</button>

            <div class="register-link">
              <p>¿No tenés cuenta? <a href="register.html">Registrate gratis</a></p>
            </div>
          </form>
          </form>
        </div>
      </main>
      
      <footer>
        
      </footer>
    </div>
    <div class="home-btn"></div>
  </div>
</body>
</html>
