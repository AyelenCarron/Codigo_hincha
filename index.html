<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name = "keywords"content="'Código Hincha|Ingresar a la cancha' es una red social, fútbol, hinchas, clubes, equipos, fanáticos, deporte, pelota, partido, gol, cancha, publicaciones, comunidad, deporte">
    <meta name = "description" content="'Código Hincha|Ingresar a la cancha' es una red social donde los fanáticos del fútbol pueden compartir publicaciones, seguir a sus equipos favoritos, interactuar con otros hinchas y mantenerse informados sobre las últimas novedades deportivas. Donde el fútbol se vuelve comunidad y la pasión de cada hincha se grita en la misma cancha. Futbol pasión y tribuna. Tu deporte, tu partido, tu gol.">
  <title>Código Hincha - Ingresar a la cancha</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Playwrite+AR+Guides&display=swap"
    rel="stylesheet">
</head>

<body class="phone-wrapper">
  <header>
    <h1>Código Hincha</h1>
  </header>

  <main>
    <div class="login">
      <div class="copa-wrapper">
        <div class="copa">
          <img src="copa-con-manos.png" alt="Copa sostenida por dos manos">
        </div>
        <div class="sombra-copa"></div>
      </div>
      <h2>Bienvenido/a</h2>
      <form>
        <p class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="email" required placeholder="tu@email.com">
        </p>

        <p class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </p>

        <button type="submit" class="btn-primary">Iniciar sesión</button>

        <div class="register-link">
          <p>¿No tenés cuenta? <a href="register.html">Registrate gratis</a></p>
        </div>
      </form>

    </div>
  </main>
  <footer>
    <p>&copy; 2026 Red Social</p>
  </footer>
  <script src="login.js"></script>
</body>

</html>
