<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Hincha - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-wrapper">
        <div class="screen">
            <header>
                <h1>Código Hincha</h1>
                <button id="burger" class="menu-btn">☰</button>
                <nav id="nav-menu" class="nav-links">
                    <a href="muro.html">Home</a>
                    <a href="followed.html">Seguidores</a>
                    <a href="#" id="logout" class="logout-link">Cerrar sesión</a>
                </nav>
            </header>
            
            <main class="form-container">
                <h2>Registro de Usuario</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" name="name" placeholder="Pepe" required>
                    </div>

                    <div class="form-group">
                        <label for="lastname">Apellido:</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Lopez" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Fecha de Nacimiento:</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Nombre de Usuario:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Repetir contraseña:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            <span>Acepto los <a href="term_conditions.html">Términos y condiciones</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Registrar</button>
                </form>
            </main>
        </div>
        <div class="home-btn"></div>
    </div>
</body>
</html>
