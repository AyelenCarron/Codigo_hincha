<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Hincha - Nuevo hincha</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="phone-wrapper">

    <section class="screen">
        <header>
            <h1>Nuevo Hincha</h1>
            <button id="burger" class="menu-btn">☰</button>
            <nav id="nav-menu" class="nav-links">
                <a href="feed.html">El Agite</a>
                <a href="followed.html">Seguidores</a>
                <a href="term_conditions.html">Reglamento</a>
                <a href="#" id="logout" class="logout-link">Cerrar sesión</a>
            </nav>
        </header>

        <main class="form-container">
            <h2>Registro de Usuario</h2>
            <form id="registerForm">
                <form class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" placeholder="Pepe" required>
                </form>

                <form class="form-group">
                    <label for="lastname">Apellido:</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Lopez" required>
                </form>

                <form class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </form>

                <form class="form-group">
                    <label for="date">Fecha de Nacimiento:</label>
                    <input type="date" id="date" name="date" required>
                </form>

                <form class="form-group">
                    <label for="club">¿De qué club sos hincha?</label>
                    <input type="text" id="club" name="club" placeholder="Ej: Talleres, River, Boca..." maxlength="50">
                </form>

                <form class="form-group">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </form>

                <form class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </form>

                <form class="form-group">
                    <label for="confirmPassword">Repetir contraseña:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </form>

                <form class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span>Acepto los <a href="term_conditions.html">Términos y condiciones</a></span>
                    </label>
                </form>

                <button type="submit" class="btn-primary">Registrar</button>
            </form>
        </main>
    </section>
    <div class="home-btn"></div>

    <script src="register.js"></script>
</body>

</html>
