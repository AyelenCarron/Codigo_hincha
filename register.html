<!DOCTYPE html>
<html lang="es">
    
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name = "keywords"content="'Nuevo hincha' registro, crear cuenta, fútbol, hinchas, clubes, equipos, fanáticos, comunidad, deporte, red social, pasión, tribuna">
    <meta name = "description " content="'Nuevo hincha' para una red social donde te invita a formar parte de una comunidad creada para los amantes del fútbol. Registrate, compartí tu pasión, seguí a tus equipos favoritos y viví cada partido junto a miles de hinchas.">
    <title>Código Hincha - Nuevo hincha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="phone-wrapper">

        <header>
            <h1>Nuevo Hincha</h1>
            <button id="burger" class="menu-btn">☰</button>
            <nav id="nav-menu" class="nav-links">
                <a href="feed.html">El Agite</a>
                <a href="followed.html">Seguidores</a>
                <a href="term_conditions.html">Reglamento</a>
                <a href="index.html">Cerrar sesión</a>
            </nav>
        </header>

        <main class="form-container">
            <h2>Registro de Usuario</h2>
            <form id="registerForm">
                <fieldset class="form-group form-section">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" placeholder="Pepe" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="lastname">Apellido:</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Lopez" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="date">Fecha de Nacimiento:</label>
                    <input type="date" id="date" name="date" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="club">¿De qué club sos hincha?</label>
                    <select id="club" name="club">
                        <option value="">Prefiero no decirlo</option>
                    </select>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </fieldset>

                <fieldset class="form-group form-section">
                    <label for="confirmPassword">Repetir contraseña:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </fieldset>

                <fieldset class="form-group form-section checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span>Acepto los <a href="term_conditions.html">Términos y condiciones</a></span>
                    </label>
                </fieldset>

                <button type="submit" class="btn-primary">Registrar</button>
            </form>
        </main>
         <footer>
            <p>&copy; 2026 Código Hincha</p>
        </footer>

    </section>
    
    <script src="script.js"></script>
    <script src="register.js"></script>
</body>
</html>
