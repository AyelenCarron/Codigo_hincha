<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Código Hincha</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Código Hincha</h1>
            <button id="burger">☰</button>
        </header>
        <main lass="form-container>
            <h2>Registro de Usuario</h2>
                <form id="registerForm">
                    <label for="name">Nombre :</label>
                    <input type="text" id="name" name="name" required>

                    <label for="lastname">Apellido :</label>
                    <input type="text" id="lastname" name="lastname" required>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="date">Fecha de Nacimiento:</label>
                    <input type="date" id="date" name="date" required>

                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" name="username" required> 
                    
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>

                    <label for="confirmPassword">Repetir contraseña:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>

                    <label>
                    <input type="checkbox" id="terms" required> Acepto los <a href="term_conditions.html">Política de privacidad</a>
                    </label>

                    <button type="submit"class="btn-primary"> </button>>Registrar</button>
                </form>
        </main>
    </body>

</html>
